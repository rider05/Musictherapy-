<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>உணர்வு இசை — Tamil Soul Healing</title>
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Crimson+Pro:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <style>
    :root {
      --saffron: #E8620A;
      --gold: #C9930C;
      --maroon: #7A1515;
      --cream: #FFF6E8;
      --text-dark: #2C1610;
      --border: rgba(200,120,40,0.25);
    }

    body { font-family: 'Crimson Pro', serif; background: var(--cream); color: var(--text-dark); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg, var(--maroon), var(--saffron)); padding: 2.5rem 1rem; text-align: center; color: #FFF0D0; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    header h1 { font-family: 'Yatra One', cursive; font-size: clamp(2rem, 8vw, 2.8rem); margin: 0; }
    header h1 span { display: block; font-family: 'Noto Sans Tamil', sans-serif; font-size: 0.5em; color: var(--gold); margin-bottom: 5px; }

    main { max-width: 600px; margin: -1.5rem auto 3rem; padding: 0 1rem; width: 100%; box-sizing: border-box; }
    .step-card { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border); margin-bottom: 1.5rem; }

    #status-bar { text-align: center; padding: 0.8rem; font-size: 0.95rem; color: var(--maroon); font-weight: 600; min-height: 1.2rem; }

    .video-wrap { width: 100%; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 4/3; margin-bottom: 1rem; }
    video { width: 100%; height: 100%; object-fit: cover; }

    .btn-action { width: 100%; padding: 1.1rem; border: none; border-radius: 12px; font-family: 'Yatra One', cursive; font-size: 1.2rem; cursor: pointer; transition: 0.3s; background: var(--saffron); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-action:hover { filter: brightness(1.1); transform: translateY(-2px); }
    
    .upload-area { position: relative; width: 100%; margin-top: 1rem; }
    .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .emotion-result { display: flex; align-items: center; gap: 1.5rem; background: rgba(232, 98, 10, 0.05); border-radius: 15px; padding: 1.2rem; margin-bottom: 1.5rem; }
    .emoji-box { font-size: 3.5rem; }

    .audio-player-box { background: #fcfcfc; border: 1px solid var(--border); border-radius: 15px; padding: 1.5rem; text-align: center; }
    #song-title { font-family: 'Yatra One', cursive; color: var(--maroon); font-size: 1.3rem; margin-bottom: 5px; }
    audio { width: 100%; border-radius: 50px; margin-top: 1rem; }

    .hidden { display: none !important; }
    footer { margin-top: auto; padding: 2rem; text-align: center; font-size: 0.8rem; color: var(--gold); }
  </style>
</head>
<body>

  <header>
    <h1><span>உணர்வு இசை</span>Tamil Soul Healing</h1>
    <p style="margin: 5px 0 0; opacity: 0.9;">Fast Native Audio Restoration</p>
  </header>

  <main>
    <div id="status-bar">Initializing AI...</div>

    <div class="step-card" id="input-section">
      <div class="video-wrap"><video id="video" autoplay muted playsinline></video></div>
      <button class="btn-action" onclick="captureFromCamera()">📸 Capture My Mood</button>
      <div class="upload-area">
        <button class="btn-action" style="background: #fdf2e9; color: var(--saffron); border: 1px solid var(--saffron);">🖼️ Upload Photo</button>
        <input type="file" accept="image/*" onchange="handleFileUpload(event)" />
      </div>
    </div>

    <div id="result-section" class="step-card hidden">
      <div class="emotion-result">
        <div class="emoji-box" id="res-emoji">😊</div>
        <div>
          <h2 id="res-name" style="margin: 0; color: var(--saffron); text-transform: capitalize;">Mood Detected</h2>
          <p id="res-msg" style="margin: 5px 0 0; font-size: 0.95rem; line-height: 1.4; color: #555;"></p>
        </div>
      </div>

      <div class="audio-player-box">
        <div id="song-title">Initializing Melody...</div>
        <audio id="audio-player" controls autoplay></audio>
      </div>

      <button class="btn-action" style="background:#666; margin-top:1.5rem;" onclick="location.reload()">↺ Restart Session</button>
    </div>
    <canvas id="proc-canvas" class="hidden"></canvas>
  </main>

  <script>
    const MOOD_CURE = {
      happy: { emoji: '😄', q: 'Tamil happy', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
      sad: { emoji: '🌿', q: 'Tamil soothing melody', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
      angry: { emoji: '🌊', q: 'Tamil flute peaceful', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
      fearful: { emoji: '🛡️', q: 'Tamil devotional', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' },
      neutral: { emoji: '🧘', q: 'Tamil soft melody', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3' },
      surprised: { emoji: '✨', q: 'Tamil joy', backup: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3' }
    };

    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/model';
    let videoStream = null;

    async function init() {
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
        document.getElementById('status-bar').innerText = "AI Ready.";
        videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = videoStream;
      } catch (e) { document.getElementById('status-bar').innerText = "Camera/Model Error."; }
    }

    async function captureFromCamera() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('proc-canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      runAnalysis(canvas);
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => runAnalysis(img);
      };
      reader.readAsDataURL(file);
    }

    async function runAnalysis(source) {
      document.getElementById('status-bar').innerText = "Analyzing Soul...";
      const detections = await faceapi.detectAllFaces(source, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
      if (!detections.length) { alert("Face not found."); return; }
      const dominant = Object.entries(detections[0].expressions).sort((a,b) => b[1] - a[1])[0][0];
      showResults(dominant);
    }

    function showResults(emo) {
      const data = MOOD_CURE[emo] || MOOD_CURE.neutral;
      document.getElementById('input-section').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
      document.getElementById('res-emoji').innerText = data.emoji;
      document.getElementById('res-name').innerText = emo;
      
      if(videoStream) videoStream.getTracks().forEach(t => t.stop());
      fetchAudio(data);
    }

    async function fetchAudio(moodData) {
      const title = document.getElementById('song-title');
      const player = document.getElementById('audio-player');
      title.innerText = "Searching for melody...";

      // Setting a 5-second timeout for the API
      const timeout = setTimeout(() => {
        if(player.src === "" || player.paused) {
          title.innerText = "Restoration Melody (Backup)";
          player.src = moodData.backup;
          player.play().catch(()=>alert("Please click play manually."));
        }
      }, 5000);

      try {
        const resp = await fetch(`https://saavn.dev/api/search/songs?query=${encodeURIComponent(moodData.q + " tamil")}&limit=1`);
        const json = await resp.json();
        const song = json.data.results[0];
        
        if (song) {
          clearTimeout(timeout);
          title.innerText = song.name;
          player.src = song.downloadUrl[song.downloadUrl.length - 1].url;
          player.play();
        } else { throw new Error(); }
      } catch (e) {
        clearTimeout(timeout);
        title.innerText = "Healing Frequency (Offline Mode)";
        player.src = moodData.backup;
        player.play();
      }
    }

    init();
  </script>
</body>
</html>
